var allTerms=Object.keys(library);
function shuffleSelect(arr,n){var copy=arr.slice();for(var i=copy.length-1;i>0;i--){var j=Math.random()*i|0;var tmp=copy[i];copy[i]=copy[j];copy[j]=tmp}return copy.slice(0,n)}
var sessionTerms=shuffleSelect(allTerms,60);

function getRandomTerm(){if(termPool.length===0)termPool=shuffleSelect(allTerms,60);return termPool.splice(Math.random()*termPool.length|0,1)[0]}

function FloatingEq(){this.reset(true);this.textWidth=80}
FloatingEq.prototype.reset=function(init){
  this.x=Math.random()*W;this.y=init?Math.random()*H:H+20;
  this.vx=(Math.random()-.5)*.15;this.vy=-(Math.random()*.12+.04);
  this.text=getRandomTerm();this.size=8+Math.random()*7;
  this.alpha=.06+Math.random()*.18;this.maxAlpha=this.alpha;this.fadeIn=0;
  this.rotation=(Math.random()-.5)*.15;this.drift=Math.random()*6.28;
  this.driftSpeed=.002+Math.random()*.003;this.driftAmount=8+Math.random()*15;
  this.hovered=false;this.hoverGlow=0;
  this.pulsePhase=Math.random()*6.28;this.pulseSpeed=.008+Math.random()*.015;
  this.pulseDepth=.3+Math.random()*.5;
  this.colorIdx=Math.random()*darkColors.length|0;
  this.color=darkColors[this.colorIdx];
  this.hoverColor=this.color.split(',').map(function(c){return Math.min(255,(+c)+60)}).join(',');
};
FloatingEq.prototype.updateColor=function(){
  var c=isLightMode?lightColors:darkColors;this.color=c[this.colorIdx];
  this.hoverColor=this.color.split(',').map(function(c){return Math.min(255,(+c)+60)}).join(',');
};
FloatingEq.prototype.update=function(){
  this.drift+=this.driftSpeed;this.pulsePhase+=this.pulseSpeed;
  this.x+=this.vx+Math.sin(this.drift)*this.driftAmount*.003;this.y+=this.vy;
  if(this.fadeIn<1)this.fadeIn+=.008;if(this.y<-30)this.reset(false);
  if(this.hovered&&this.hoverGlow<1)this.hoverGlow=Math.min(1,this.hoverGlow+.08);
  if(!this.hovered&&this.hoverGlow>0)this.hoverGlow=Math.max(0,this.hoverGlow-.04);
};
FloatingEq.prototype.hitTest=function(mx,my){
  var dx=mx-this.x,dy=my-(this.y-this.size*.35);
  return dx>-20&&dx<this.textWidth+20&&dy>-this.size&&dy<this.size;
};
FloatingEq.prototype.draw=function(){
  var breath=1-this.pulseDepth*.5+Math.sin(this.pulsePhase)*this.pulseDepth*.5;
  var baseA=this.maxAlpha*Math.min(this.fadeIn,1)*breath;

};

var eqAnimating=false;
function animateEqs(){

  if(isLightMode){tooltip.style.background='rgba(245,247,252,.95)';tooltip.style.color='#2a3448';tooltip.style.borderColor='rgba(74,106,154,.15)'}
  else{tooltip.style.background='rgba(10,12,18,.92)';tooltip.style.color='#c8d6e5';tooltip.style.borderColor='rgba(168,196,224,.15)'}
  localStorage.setItem('theme',isLightMode?'light':'dark');
}
themeBtn.addEventListener('click',function(){isLightMode=!isLightMode;applyTheme()});

// Video control
var video=document.getElementById('hero-video');
var content=document.getElementById('content');
var eqCanvas=document.getElementById('eq-canvas');
var skipBtn=document.getElementById('skip');
var hint=document.getElementById('hint');
var themeToggle=document.getElementById('theme-toggle');

function showContent(){
  video.style.transition='opacity 1.5s ease-out';video.style.opacity='0';
  content.classList.add('visible');eqCanvas.classList.add('visible');
  hint.classList.add('visible');themeToggle.classList.add('visible');
  skipBtn.classList.add('hidden');
  eqAnimating=true;animateEqs();
  setTimeout(function(){video.pause();video.style.display='none'},2000);
  sessionStorage.setItem('intro-seen','true');
  var saved=localStorage.getItem('theme');
  if(saved==='light'){isLightMode=true;applyTheme()}
}

setTimeout(function(){skipBtn.classList.add('show')},3000);
video.addEventListener('ended',showContent);
skipBtn.addEventListener('click',showContent);
var pp=video.play();if(pp!==undefined){pp.catch(function(){showContent()})}
video.addEventListener('loadedmetadata',function(){
  setTimeout(function(){if(!content.classList.contains('visible'))showContent()},(video.duration*1000)+2000);
});
if(sessionStorage.getItem('intro-seen')){
  video.style.display='none';video.pause();
  content.classList.add('visible');eqCanvas.classList.add('visible');
  hint.classList.add('visible');themeToggle.classList.add('visible');
  skipBtn.classList.add('hidden');eqAnimating=true;animateEqs();
  var saved=localStorage.getItem('theme');
  if(saved==='light'){isLightMode=true;applyTheme()}
}
</script>
</body>
</html>
